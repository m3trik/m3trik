name: Refresh API Registry

# Triggered by each ecosystem repo's publish.yml after a successful PyPI upload
# (via repository_dispatch event_type "refresh_api_registry"). Also runs monthly
# as a backstop for any missed dispatches, and supports manual workflow_dispatch.
on:
  repository_dispatch:
    types: [refresh_api_registry]
  schedule:
    - cron: '7 13 1 * *'  # Monthly safety net (1st @ 13:07 UTC, off the :00 mark)
  workflow_dispatch:

# Latest-wins: if 4 ecosystem packages publish in quick succession during a
# normal release cascade, only the last refresh has the full picture; cancel
# in-flight refreshes so we don't burn 4 runners producing the same artifact.
concurrency:
  group: refresh-api-registry
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # ``contents: write`` lets the default GITHUB_TOKEN push the m3trik
    # shadow report. Cross-repo pushes to the ecosystem packages still
    # need REPO_DISPATCH_TOKEN (set as a repo secret).
    permissions:
      contents: write
    steps:
      - name: Verify cross-repo token
        env:
          TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::REPO_DISPATCH_TOKEN is not set on this repository."
            echo "::error::Add it under Settings → Secrets → Actions with cross-repo push scope to pythontk/uitk/mayatk/blendertk/tentacle/unitytk/extapps."
            exit 1
          fi

      - name: Checkout m3trik
        uses: actions/checkout@v4
        with:
          ref: main
          path: m3trik

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git identity
        run: |
          git config --global user.email "agent@m3trik.dev"
          git config --global user.name "api-registry-bot"

      - name: Clone ecosystem repos as siblings of m3trik
        env:
          TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
        run: |
          # Tolerate per-repo auth/clone failures: the token may lack scope
          # for newer repos, but the refresh should still cover the rest.
          # The generator skips missing siblings gracefully.
          # x-access-token works for both classic PATs and installation tokens.
          for repo in pythontk uitk mayatk blendertk tentacle unitytk extapps; do
            if ! git clone --branch dev \
                "https://m3trik:${TOKEN}@github.com/m3trik/${repo}.git" \
                "${repo}"; then
              echo "::warning::Failed to clone ${repo} (token may lack scope) — skipping"
            fi
          done

      - name: Run generator
        run: python m3trik/scripts/generate_api_registry.py

      - name: Check context budget (repo-side)
        # Gate the agent-facing context surface: CLAUDE.md sizes + registry
        # freshness. Memory-index checks are skipped (the auto-memory dir is
        # local, not in CI); the dispatch check self-skips without the monorepo
        # root CLAUDE.md. --no-runtime keeps this job import-free (the whole point
        # of the AST registry): runtime-vs-static drift needs importable/DCC
        # runtimes and is checked locally by Check-RuntimeSurface.ps1, not here.
        # Fails the job on a hard budget breach.
        run: python m3trik/scripts/check_context_budget.py --no-memory --no-runtime

      - name: Commit and push per-package registries
        env:
          TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
          DISPATCH_PACKAGE: ${{ github.event.client_payload.package }}
        run: |
          set -e
          # actions/checkout installs a global http.extraheader for
          # github.com that points at m3trik's GITHUB_TOKEN — it overrides
          # the per-clone oauth2:TOKEN credential when pushing, so
          # cross-repo pushes fail. Push via an explicit token-bearing URL
          # to bypass the global header.
          # push.ps1 cascade and other workflows can land commits on dev
          # between our clone and our push. Fetch+rebase before each push,
          # and retry once on rejection (the second push covers another
          # racer landing during our rebase window). A second rejection is
          # rare enough that the next scheduled refresh will pick it up.
          for repo in pythontk uitk mayatk blendertk tentacle unitytk extapps; do
            if [ ! -d "${repo}" ]; then
              echo "${repo}: skipped (not cloned)"
              continue
            fi
            cd "${repo}"
            if git status --porcelain API_INDEX.md API_REGISTRY.md API_REGISTRY.json API_CHANGES.md | grep -q .; then
              git add API_INDEX.md API_REGISTRY.md API_REGISTRY.json API_CHANGES.md
              git commit -m "chore: refresh API registry [skip ci]"
              push_url="https://m3trik:${TOKEN}@github.com/m3trik/${repo}.git"
              for attempt in 1 2; do
                git -c http."https://github.com/".extraheader= \
                    fetch "${push_url}" dev
                git rebase FETCH_HEAD || {
                  echo "::warning::${repo}: rebase produced conflicts on attempt ${attempt} — aborting"
                  git rebase --abort
                  break
                }
                if git -c http."https://github.com/".extraheader= \
                       push "${push_url}" HEAD:dev; then
                  echo "${repo}: pushed (attempt ${attempt})"
                  break
                elif [ "${attempt}" = "2" ]; then
                  echo "::warning::${repo}: push rejected twice — next refresh will retry"
                fi
              done
            else
              echo "${repo}: no changes"
            fi
            cd ..
          done

      - name: Commit and push m3trik shadow report
        run: |
          cd m3trik
          if git status --porcelain docs/API_SHADOWS.md | grep -q .; then
            git add docs/API_SHADOWS.md
            git commit -m "chore: refresh API shadow report [skip ci]"
            git push origin main
            echo "m3trik: pushed"
          else
            echo "m3trik: no changes"
          fi
